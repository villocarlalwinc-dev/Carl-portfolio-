<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story | Homepage</title>
    <meta http-equiv="Content-Security-Policy" 
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; object-src 'none';">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

    <nav class="dash-navbar">
        <div class="dash-logo">My Portfolio</div>
        <a href="homepage.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Homepage
        </a>
    </nav>

    <main class="page-content">
        <div id="storyOverlay" style="display:flex;">
            <div class="story-card">
                <div class="story-icon" id="storyIcon"><i class="fas fa-owl"></i></div>
                <h2 class="story-title" id="storyTitle">Nico the Night Owl</h2>
                <p class="story-text" id="storyText">Nico was a little owl who loved watching the stars.</p>
                <div class="story-buttons">
                    <button class="prev-btn" onclick="prevStory()">Previous</button>
                    <button class="next-btn" onclick="nextStory()">Next</button>
                    <button class="close-btn" onclick="closeStory()">Close</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
